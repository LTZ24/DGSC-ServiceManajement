name: dgsc_mobile
description: Digitech Service – Mobile Application for DigiTech Service Center

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & Networking
  http: ^1.2.0
  shared_preferences: ^2.2.2

  # Firebase (Spark plan — free, no Storage needed)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

  # Local file storage (foto profil & receipt — tidak perlu cloud)
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FF6B35"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
