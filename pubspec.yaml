name: dgsc_mobile
description: Digitech Service – Mobile Application for DigiTech Service Center

publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & Networking
  shared_preferences: ^2.2.2

  # Supabase (PostgreSQL + Auth)
  supabase_flutter: ^2.8.4
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.7
  flutter_local_notifications: ^19.4.0
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.2
  local_auth: ^2.3.0

  # Local file storage (foto profil & receipt — tidak perlu cloud)
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  image: ^4.5.4
  share_plus: ^11.1.0

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  blue_thermal_helper: ^2.0.0
  esc_pos_utils_plus: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
